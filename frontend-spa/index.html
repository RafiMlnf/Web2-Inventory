<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Inventory PC — Manajemen Inventaris Komponen</title>
  <meta name="description" content="Sistem informasi manajemen inventaris toko komponen PC berbasis web." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.cdnfonts.com/css/google-sans" rel="stylesheet">

  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Product Sans"', '"Google Sans"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          colors: {
            primary:  { DEFAULT: '#1A70F5', dark: '#1260D9', light: '#EBF2FF' },
            dark:     '#0F0F11',
            surface:  '#F2F3F7',
            card:     '#FFFFFF',
            border:   '#E8E9EC',
          },
          borderRadius: {
            card: '18px',
            xl2: '22px',
          },
          boxShadow: {
            card: '0 1px 3px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.05)',
            modal: '0 20px 60px rgba(0,0,0,0.18)',
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #1A70F5;
      --primary-dark:  #1260D9;
      --primary-light: #EBF2FF;
      --dark:          #0F0F11;
      --bg:            #EBF0F8;
      --card:          rgba(255, 255, 255, 0.45);
      --text-1:        #0F0F11;
      --text-2:        #555E6D;
      --text-3:        #8C96A5;
      --border:        rgba(26, 112, 245, 0.08);
      --danger:        #EF4444;
      --danger-light:  #FEF2F2;
      --success:       #10B981;
      --success-light: #ECFDF5;
      --warning:       #F59E0B;
      --warning-light: #FFFBEB;
      --sidebar-w:     248px;
      --topbar-h:      64px;
      --radius-card:   20px;
      --radius-sm:     12px;
      --radius-xs:     8px;
      --shadow-card:   0 8px 32px 0 rgba(31, 38, 135, 0.05), 0 1px 3px rgba(0,0,0,0.02);
      --shadow-sm:     0 1px 2px rgba(0,0,0,0.04);
      --transition:    0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Google Sans", "Product Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      color: var(--text-1);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
    }

    /* ── Background Glows ────────────────────── */
    .bg-glow-1 {
      position: fixed;
      top: -10%;
      right: 5%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26, 112, 245, 0.25) 0%, rgba(26, 112, 245, 0) 70%);
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: pulse-glow-1 12s ease-in-out infinite alternate;
    }
    .bg-glow-2 {
      position: fixed;
      bottom: -10%;
      left: -5%;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.22) 0%, rgba(124, 58, 237, 0) 70%);
      filter: blur(95px);
      pointer-events: none;
      z-index: 0;
      animation: pulse-glow-2 15s ease-in-out infinite alternate;
    }
    .bg-glow-3 {
      position: fixed;
      top: 35%;
      left: 35%;
      width: 550px;
      height: 550px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.16) 0%, rgba(236, 72, 153, 0) 70%);
      filter: blur(85px);
      pointer-events: none;
      z-index: 0;
      animation: pulse-glow-3 18s ease-in-out infinite alternate;
    }

    @keyframes pulse-glow-1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 40px) scale(1.15); }
    }
    @keyframes pulse-glow-2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-40px, -50px) scale(1.2); }
    }
    @keyframes pulse-glow-3 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }

    #app { height: 100%; position: relative; z-index: 1; }

    /* ── Layout ─────────────────────────────── */
    .app-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin-left: var(--sidebar-w);
    }
    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 40px;
    }

    /* ── Cards ──────────────────────────────── */
    .card {
      background: rgba(255, 255, 255, 0.45) !important;
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.5) !important;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
    }
    .card-dark {
      background: rgba(15, 15, 17, 0.75) !important;
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      border-radius: var(--radius-card);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15), var(--shadow-card);
      color: #fff;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.45) !important;
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.5) !important;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
    }


    /* ── Buttons ─────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      white-space: nowrap;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-outline {
      background: transparent;
      color: var(--text-1);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover { background: var(--bg); }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text-1); }

    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; }

    .btn-sm { padding: 8px 14px; font-size: 13px; }
    .btn-lg { padding: 14px 28px; font-size: 15px; }
    .btn-block { width: 100%; }

    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xs);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      transition: all var(--transition);
    }
    .btn-icon:hover { background: var(--bg); color: var(--text-1); }

    /* ── Form Elements ───────────────────────── */
    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 7px;
    }

    .form-control {
      display: block;
      width: 100%;
      padding: 11px 14px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-1);
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: all var(--transition);
    }
    .form-control:focus {
      background: rgba(255, 255, 255, 0.85);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,112,245,0.12);
    }
    .form-control::placeholder { color: var(--text-3); }
    .form-control.is-invalid { border-color: var(--danger); }

    .input-group {
      position: relative;
    }
    .input-group .form-control { padding-left: 40px; }
    .input-group-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      display: flex;
      pointer-events: none;
    }
    .input-group-suffix {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
    }

    select.form-control { appearance: none; cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 90px; }

    .form-hint { font-size: 12px; color: var(--text-3); margin-top: 5px; }
    .form-error { font-size: 12px; color: var(--danger); margin-top: 5px; }

    /* ── Page header ─────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      animation: swipeUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .page-header-title h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.3px;
    }
    .page-header-title p {
      font-size: 13.5px;
      color: var(--text-2);
      margin-top: 3px;
    }
    .page-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Alert/Badge ─────────────────────────── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      margin-bottom: 18px;
    }
    .alert-danger { background: var(--danger-light); color: var(--danger); }
    .alert-success { background: var(--success-light); color: var(--success); }
    .alert-warning { background: var(--warning-light); color: var(--warning); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-primary { background: var(--primary-light); color: var(--primary); }
    .badge-success { background: var(--success-light); color: var(--success); }
    .badge-danger  { background: var(--danger-light);  color: var(--danger); }
    .badge-warning { background: var(--warning-light); color: var(--warning); }
    .badge-neutral { background: var(--bg); color: var(--text-2); border: 1px solid var(--border); }

    /* ── Table ───────────────────────────────── */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;
    }
    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table thead tr {
      border-bottom: 1px solid var(--border);
    }
    .data-table thead th {
      padding: 8px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }
    .data-table thead th:not(:last-child) {
      border-right: 1px solid var(--border);
    }
    .data-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .data-table tbody tr:last-child { border-bottom: none; }
    .data-table tbody tr:hover { background: rgba(26, 112, 245, 0.04); }
    .data-table tbody td {
      padding: 8px 12px;
      color: var(--text-1);
      vertical-align: middle;
    }
    .data-table tbody td:not(:last-child) {
      border-right: 1px solid var(--border);
    }
    
    /* ── Compact Table ───────────────────────── */
    table.data-table.compact thead th {
      padding: 5px 8px;
      font-size: 10px;
    }
    table.data-table.compact tbody td {
      padding: 5px 8px;
      font-size: 12px;
    }

    /* ── Stats Card ──────────────────────────── */
    .stat-card {
      background: rgba(255, 255, 255, 0.45) !important;
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.5) !important;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 22px 24px;
    }
    .stat-card-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .stat-card-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    
    @keyframes swipeUpFade {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .animate-swipe-up-fade {
      opacity: 0;
      animation: swipeUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    
    .stat-card-sub {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 8px;
    }

    /* ── Misc ────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .text-primary { color: var(--primary); }
    .text-danger  { color: var(--danger); }
    .text-success { color: var(--success); }
    .text-muted   { color: var(--text-2); }
    .font-bold    { font-weight: 700; }
    .font-medium  { font-weight: 500; }

    /* ── Scrollbar ───────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }

    /* ── Loading spinner ─────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ─────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-2);
    }
    .empty-state svg { margin-bottom: 16px; opacity: 0.35; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
    .empty-state p  { font-size: 13.5px; }

    /* ── Grid helpers ────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

    /* ── Fade transition ─────────────────────── */
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }

    /* ── Modal animations ────────────────────── */
    .modal-fade-enter-active { transition: opacity 0.2s ease; }
    .modal-fade-leave-active { transition: opacity 0.15s ease; }
    .modal-fade-enter-from,
    .modal-fade-leave-to { opacity: 0; }
    .modal-fade-enter-active .modal-box { animation: modal-slide-in 0.2s ease; }
    @keyframes modal-slide-in {
      from { transform: translateY(-12px) scale(0.98); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* ── Sidebar ─────────────────────────────── */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: rgba(15, 15, 17, 0.82) !important;
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      z-index: 100;
      padding: 20px 10px 20px 18px;
      overflow-y: auto;
      color: #fff;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .sidebar::-webkit-scrollbar {
      display: none;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 10px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 16px;
    }
    .sidebar-logo-icon {
      width: 34px; height: 34px;
      background: var(--primary);
      color: #fff;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sidebar-logo-text {
      font-size: 14.5px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
    }
    .sidebar-greeting {
      background: linear-gradient(135deg, #1A70F5, #0d53c0);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 14px;
      margin: 0 0 20px;
      box-shadow: 0 4px 12px rgba(26, 112, 245, 0.25);
    }
    .sidebar-greeting-name {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.45;
    }
    .sidebar-greeting-name strong {
      font-weight: 700;
      color: #ffffff;
    }
    .sidebar-greeting-role {
      font-size: 11px;
      color: #ffffff;
      font-weight: 600;
      display: inline-block;
      background: rgba(255, 255, 255, 0.16);
      padding: 2.5px 10px;
      border-radius: 50px;
      margin-top: 6px;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
    .sidebar-nav { flex: 1; }
    .sidebar-group { margin-bottom: 10px; }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.65);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      position: relative;
      overflow: hidden;
      transition: color var(--transition);
      margin-bottom: 2px;
    }
    .sidebar-link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
      transition: all 0.28s cubic-bezier(0.25, 0.8, 0.25, 1);
      opacity: 0;
      z-index: 0;
    }
    .sidebar-link:not(.active):hover::before {
      left: 0;
      opacity: 1;
    }
    .sidebar-link:hover {
      color: #fff;
    }
    .sidebar-link > * {
      position: relative;
      z-index: 1;
    }
    .sidebar-link.active {
      background: #fff;
      color: var(--dark);
    }
    .sidebar-link-icon { display: flex; flex-shrink: 0; }
    .sidebar-footer {
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }
    .sidebar-logout {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.65);
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color var(--transition);
    }
    .sidebar-logout::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.08) 100%);
      transition: all 0.28s cubic-bezier(0.25, 0.8, 0.25, 1);
      opacity: 0;
      z-index: 0;
    }
    .sidebar-logout:hover::before {
      left: 0;
      opacity: 1;
    }
    .sidebar-logout:hover {
      color: #ef4444;
    }
    .sidebar-logout > * {
      position: relative;
      z-index: 1;
    }

    /* ── Login Page ──────────────────────────── */
    .login-page {
      display: flex;
      min-height: 100vh;
      background: var(--bg);
    }
    .login-brand {
      flex: 0 0 45%;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 56px;
      position: relative;
      overflow: hidden;
    }
    .login-brand::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(26,112,245,0.12);
      top: -100px; right: -100px;
    }
    .login-brand::after {
      content: '';
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: rgba(26,112,245,0.07);
      bottom: -60px; left: -60px;
    }
    .login-brand-inner {
      position: relative;
      z-index: 1;
      max-width: 400px;
    }
    .login-brand-badge {
